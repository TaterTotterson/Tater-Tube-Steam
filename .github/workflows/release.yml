name: Steam Linux release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: steam-linux-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-release:
    name: Linux x86_64 (Steam Runtime 3.0)
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      contents: write
    env:
      STEAM_RUNTIME_ROOT: ${{ github.workspace }}/out/steam-runtime
      STEAM_DEPOT_ROOT: ${{ github.workspace }}/out/steam/depot

    steps:
      - name: Checkout release source
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Validate release version
        id: release
        shell: bash
        run: |
          set -euo pipefail

          app_version="$({
            sed -nE \
              's/^project\(TaterTube VERSION ([0-9]+\.[0-9]+\.[0-9]+) LANGUAGES CXX\)$/\1/p' \
              CMakeLists.txt
          })"
          if [ -z "${app_version}" ]; then
            echo "Could not read the Tater Tube version from CMakeLists.txt." >&2
            exit 1
          fi

          is_tag=false
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            is_tag=true
            release_version="${GITHUB_REF_NAME}"
            if [[ ! "${release_version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
              echo "Release tag must use vMAJOR.MINOR.PATCH with an optional prerelease suffix." >&2
              exit 1
            fi

            tag_app_version="${release_version#v}"
            tag_app_version="${tag_app_version%%-*}"
            if [ "${tag_app_version}" != "${app_version}" ]; then
              echo "Tag ${release_version} does not match app version ${app_version}." >&2
              exit 1
            fi
          else
            release_version="v${app_version}-manual-${GITHUB_SHA:0:7}"
          fi

          echo "app_version=${app_version}" >> "${GITHUB_OUTPUT}"
          echo "is_tag=${is_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_version=${release_version}" >> "${GITHUB_OUTPUT}"
          echo "source_commit=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Validate generated helpers
        run: bash scripts/check-generated-helpers.sh

      - name: Validate Steam container path mapping
        run: bash scripts/test-build-steam-sniper-paths.sh

      - name: Install host packaging tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y cmake curl unzip zstd
          docker version

      - name: Build bundled desktop runtimes and approved cores
        env:
          STEAM_RUNTIME_BUILD_JOBS: '2'
        run: ./scripts/build-steam-runtimes.sh "${STEAM_RUNTIME_ROOT}"

      - name: Fetch pinned static tools
        run: ./scripts/prepare-steam-static-tools.sh "${STEAM_RUNTIME_ROOT}"

      - name: Build complete portable Steam depot
        env:
          STEAM_MPV_BUNDLE: ${{ github.workspace }}/out/steam-runtime/mpv
          STEAM_MOONLIGHT_BUNDLE: ${{ github.workspace }}/out/steam-runtime/moonlight-sdl
          STEAM_RETROARCH_BUNDLE: ${{ github.workspace }}/out/steam-runtime/retroarch
          STEAM_YTDLP_BUNDLE: ${{ github.workspace }}/out/steam-runtime/yt-dlp
          STEAM_RCLONE_BUNDLE: ${{ github.workspace }}/out/steam-runtime/rclone
          STEAM_THIRD_PARTY_NOTICES_DIR: ${{ github.workspace }}/out/steam-runtime/notices
          STEAM_REQUIRE_COMPLETE_RUNTIME: '1'
          STEAM_REQUIRE_PORTABLE_DEPOT: '1'
          STEAM_RELEASE: '1'
        run: ./scripts/build-steam-sniper.sh

      - name: Verify release depot and source provenance
        env:
          STEAM_REQUIRE_COMPLETE_RUNTIME: '1'
          STEAM_REQUIRE_PORTABLE_DEPOT: '1'
        run: |
          set -euo pipefail

          test "$(tr -d '\n' < "${STEAM_DEPOT_ROOT}/BUILD-COMMIT.txt")" \
            = "${{ steps.release.outputs.source_commit }}"
          test "$(tr -d '\n' < "${STEAM_DEPOT_ROOT}/BUILD-STATE.txt")" = clean

          ./scripts/validate-steam-depot.sh "${STEAM_DEPOT_ROOT}"
          (
            cd "${STEAM_DEPOT_ROOT}"
            sha256sum -c DEPOT-SHA256SUMS.txt
          )

      - name: Package release archive
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.release_version }}
        run: |
          set -euo pipefail

          release_dir="${GITHUB_WORKSPACE}/out/release"
          release_root="Tater-Tube-Steam-${RELEASE_VERSION}-linux-x86_64"
          archive="${release_root}.tar.zst"
          source_date_epoch="$(git show -s --format=%ct HEAD)"
          mkdir -p "${release_dir}"

          tar \
            --sort=name \
            --mtime="@${source_date_epoch}" \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            --transform="s,^depot,${release_root}," \
            -I 'zstd -10 -T0' \
            -cf "${release_dir}/${archive}" \
            -C "${GITHUB_WORKSPACE}/out/steam" depot

          (
            cd "${release_dir}"
            sha256sum "${archive}" > SHA256SUMS.txt
            zstd --test "${archive}"
            tar --zstd -tf "${archive}" >/dev/null
            ls -lh "${archive}" SHA256SUMS.txt
          )

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Tater-Tube-Steam-${{ steps.release.outputs.release_version }}-linux-x86_64
          path: out/release/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

      - name: Publish GitHub release
        if: steps.release.outputs.is_tag == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Tater Tube Steam ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            out/release/*.tar.zst
            out/release/SHA256SUMS.txt
