name: Steam Linux smoke build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "CMakeLists.txt"
      - "Main.qml"
      - "src/**"
      - "views/**"
      - "modules/**"
      - "assets/steam/**"
      - "packaging/steam/**"
      - "scripts/*steam*.sh"
      - "tests/**"
      - ".github/workflows/steam-linux.yml"

jobs:
  build-linux-x86_64:
    name: Linux x86_64 Steam target
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Validate approved core inventory
        run: ./scripts/validate-steam-core-manifest.sh

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ffmpeg \
            ninja-build \
            qt6-base-dev \
            qt6-declarative-dev \
            qt6-svg-dev \
            qml6-module-qtquick \
            qml6-module-qtquick-controls \
            qml6-module-qtquick-window \
            libdrm-dev \
            libsdl2-dev

      - name: Build Steam target
        run: ./scripts/build-steam-linux.sh

      - name: Verify depot layout
        run: |
          test -x out/steam/depot/launch-tater-tube.sh
          test -x out/steam/depot/usr/bin/tater-tube
          test -f out/steam/depot/usr/share/240mp/Main.qml
          test -f out/steam/depot/SOURCE.txt
          test -f out/steam/depot/LICENSE.txt
          test ! -e out/steam/depot/usr/share/240mp/scripts/install.sh
          test ! -e out/steam/depot/usr/share/240mp/scripts/pi-image
          test ! -e out/steam/depot/usr/share/240mp/assets/steam

      - name: Rebuild and validate Steam artwork
        run: |
          STEAM_ASSET_OUTPUT_DIR=out/steam-assets \
            ./scripts/build-steam-assets.sh
          ./scripts/validate-steam-assets.sh out/steam-assets

      - name: Upload smoke-build depot
        uses: actions/upload-artifact@v4.6.2
        with:
          name: tater-tube-steam-linux-x86_64-smoke
          path: out/steam/depot
          if-no-files-found: error
