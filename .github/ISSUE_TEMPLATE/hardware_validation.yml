name: Hardware validation report
description: Report whether 240-MP works on a Raspberry Pi 4 composite CRT setup
title: "[Hardware]: "
labels: ["hardware-validation"]
body:
  - type: markdown
    attributes:
      value: |
        This fork targets Raspberry Pi 4 composite output to a CRT, with Argon IR remote support. Thank you for sharing your setup results.
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Raspberry Pi 4
    validations:
      required: true
  - type: dropdown
    id: display
    attributes:
      label: Display & output
      options:
        - CRT via composite (NTSC)
        - CRT via composite (PAL)
    validations:
      required: true
  - type: input
    id: os_version
    attributes:
      label: OS version
      description: e.g. Raspberry Pi OS Lite (Trixie / Debian 13)
    validations:
      required: true
  - type: dropdown
    id: result
    attributes:
      label: Overall result
      options:
        - Works great
        - Works with issues
        - Doesn't work
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: What worked / what didn't
      description: Playback, Argon IR navigation, overscan/layout, audio, boot screen, autostart, etc. Note anything you had to tweak.
    validations:
      required: true
  - type: textarea
    id: photos
    attributes:
      label: Photos of the setup (optional)
      description: Drag & drop photos of your setup or screen here — always fun to see 240-MP running in the wild.
