<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tater Tube Setup</title>
  <style>
    :root {
      --bg: #050505;
      --panel: #101010;
      --panel-2: #171717;
      --text: #f8f8f8;
      --muted: #9b9b9b;
      --line: #303030;
      --orange: #ff4a00;
      --orange-2: #ff7a1a;
      --danger: #ff3b30;
      --ok: #38d66b;
      --radius: 8px;
    }

    * { box-sizing: border-box; }
    html { background: var(--bg); color: var(--text); }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      background:
        linear-gradient(rgba(255,255,255,.035) 50%, rgba(0,0,0,.035) 50%) 0 0 / 100% 4px,
        radial-gradient(circle at 50% -20%, rgba(255,74,0,.16), transparent 42%),
        var(--bg);
    }

    button, input, select {
      font: inherit;
    }

    .shell {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 20px 14px 48px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      align-items: center;
      padding: 10px 0 18px;
    }

    .logo {
      width: min(390px, 92vw);
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .hero-copy {
      text-align: center;
      color: var(--muted);
      text-transform: uppercase;
      font-size: 13px;
      line-height: 1.5;
      letter-spacing: .02em;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      background: linear-gradient(var(--bg), rgba(5,5,5,.88));
      backdrop-filter: blur(8px);
    }

    .status {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      min-height: 18px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 9px;
      color: var(--muted);
      background: #080808;
      font-size: 12px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .pill.ok { color: var(--ok); border-color: rgba(56,214,107,.45); }
    .pill.warn { color: var(--orange-2); border-color: rgba(255,122,26,.5); }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .module-list {
      display: grid;
      gap: 10px;
    }

    .module-row {
      width: 100%;
      min-height: 84px;
      display: grid;
      grid-template-columns: 64px 1fr auto;
      gap: 12px;
      align-items: center;
      text-align: left;
      color: var(--text);
      background: linear-gradient(180deg, var(--panel), #080808);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      box-shadow: 0 12px 28px rgba(0,0,0,.24);
    }

    .module-row:focus {
      outline: none;
      border-color: var(--orange);
      box-shadow: 0 0 0 2px rgba(255,74,0,.22);
    }

    .module-row img {
      width: 64px;
      height: 64px;
      object-fit: contain;
    }

    .module-row .title {
      display: block;
      margin-bottom: 5px;
      font-size: 17px;
    }

    .module-summary {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      text-transform: uppercase;
    }

    .module-caret {
      color: var(--orange);
      font-size: 24px;
      line-height: 1;
      padding: 0 4px;
    }

    .detail-wrap {
      display: grid;
      gap: 12px;
    }

    .detail-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .detail-nav button {
      min-width: 112px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--panel), #090909);
      overflow: hidden;
      box-shadow: 0 16px 36px rgba(0,0,0,.28);
    }

    .card-head {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.025);
    }

    .card-head img {
      width: 56px;
      height: 56px;
      object-fit: contain;
    }

    .title {
      margin: 0 0 6px;
      color: var(--text);
      font-size: 19px;
      line-height: 1.1;
      text-transform: uppercase;
    }

    .sub {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .card-body {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .detail-mascot {
      display: grid;
      grid-template-columns: 1fr 112px;
      gap: 12px;
      align-items: center;
      min-height: 116px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: radial-gradient(circle at 82% 35%, rgba(255,74,0,.18), transparent 42%), #000;
    }

    .detail-mascot img {
      width: 112px;
      height: 112px;
      object-fit: contain;
    }

    .detail-mascot .note {
      margin-top: 6px;
    }

    .section-label {
      color: var(--orange-2);
      font-size: 12px;
      text-transform: uppercase;
      margin: 8px 0 -2px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    input, select {
      width: 100%;
      min-height: 44px;
      color: var(--text);
      background: #000;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 11px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 2px rgba(255,74,0,.22);
    }

    select {
      appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, var(--orange) 50%),
        linear-gradient(135deg, var(--orange) 50%, transparent 50%);
      background-position: calc(100% - 18px) 18px, calc(100% - 12px) 18px;
      background-size: 6px 6px;
      background-repeat: no-repeat;
    }

    .toggle-row {
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 11px;
      background: #000;
    }

    .switch {
      position: relative;
      width: 50px;
      height: 28px;
      flex: 0 0 auto;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #222;
      transition: .16s;
    }

    .slider:before {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      left: 3px;
      top: 3px;
      border-radius: 50%;
      background: var(--muted);
      transition: .16s;
    }

    .switch input:checked + .slider {
      background: rgba(255,74,0,.22);
      border-color: var(--orange);
    }

    .switch input:checked + .slider:before {
      transform: translateX(22px);
      background: var(--orange);
    }

    .actions {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr;
      margin-top: 4px;
    }

    button {
      min-height: 44px;
      border: 1px solid var(--orange);
      border-radius: 6px;
      color: #110500;
      background: var(--orange);
      padding: 10px 12px;
      text-transform: uppercase;
      cursor: pointer;
    }

    button.secondary {
      color: var(--text);
      background: #000;
      border-color: var(--line);
    }

    button:disabled {
      opacity: .55;
      cursor: wait;
    }

    .note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      text-transform: uppercase;
    }

    .message {
      display: none;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      background: #000;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      text-transform: uppercase;
    }

    .message.show { display: block; }
    .message.ok { color: var(--ok); border-color: rgba(56,214,107,.45); }
    .message.err { color: var(--danger); border-color: rgba(255,59,48,.45); }

    .commercial-library {
      display: grid;
      gap: 10px;
    }

    .commercial-category {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #000;
      overflow: hidden;
    }

    details.commercial-category summary {
      list-style: none;
      cursor: pointer;
    }

    details.commercial-category summary::-webkit-details-marker {
      display: none;
    }

    .commercial-category-head,
    .commercial-video-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 11px;
    }

    .commercial-category-head {
      border-bottom: 1px solid var(--line);
      color: var(--orange-2);
      text-transform: uppercase;
    }

    .commercial-category-caret {
      display: inline-block;
      color: var(--orange);
      margin-right: 8px;
      transition: transform .14s ease;
    }

    details.commercial-category[open] .commercial-category-caret {
      color: var(--orange-2);
      transform: rotate(90deg);
    }

    .commercial-video-row {
      border-top: 1px solid rgba(255,255,255,.06);
      color: var(--text);
      font-size: 12px;
      text-transform: uppercase;
    }

    .commercial-video-row:first-of-type {
      border-top: 0;
    }

    .commercial-empty {
      padding: 10px 11px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    button.tiny {
      min-height: 32px;
      padding: 6px 8px;
      font-size: 11px;
    }

    .upload-modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0,0,0,.76);
      backdrop-filter: blur(4px);
    }

    .upload-modal.show {
      display: flex;
    }

    .upload-box {
      width: min(520px, 100%);
      border: 1px solid var(--orange);
      border-radius: var(--radius);
      background:
        linear-gradient(rgba(255,255,255,.035) 50%, rgba(0,0,0,.04) 50%) 0 0 / 100% 4px,
        #050505;
      box-shadow: 0 24px 60px rgba(0,0,0,.55);
      padding: 16px;
    }

    .upload-title {
      color: var(--orange-2);
      font-size: 14px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .upload-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      text-transform: uppercase;
      margin-bottom: 12px;
      overflow-wrap: anywhere;
    }

    .progress-shell {
      height: 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #000;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--orange), var(--orange-2));
      transition: width .12s linear;
    }

    .picker-list {
      display: grid;
      gap: 8px;
    }

    .picker-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      background: #000;
    }

    .inline-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
    }

    .picker-title {
      display: block;
      color: var(--text);
      text-transform: uppercase;
      font-size: 13px;
      line-height: 1.25;
    }

    .picker-meta {
      display: block;
      color: var(--muted);
      text-transform: uppercase;
      font-size: 11px;
      margin-top: 3px;
    }

    .token-card {
      display: none;
      margin-bottom: 14px;
    }
    .token-card.show { display: block; }

    @media (min-width: 760px) {
      .shell { padding: 28px 22px 64px; }
      .grid { grid-template-columns: 1fr; }
      .module-list { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .card.app-card { grid-column: 1 / -1; }
      .actions { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <img class="logo" src="/setup/assets/images/tater-tube-readme.png" alt="Tater Tube">
      <div class="hero-copy">Mobile setup for module logins, API keys, and system settings.</div>
    </section>

    <div class="topbar">
      <div id="status" class="status">Loading setup...</div>
      <button id="reload" class="secondary" type="button">Reload</button>
    </div>

    <section id="tokenCard" class="card token-card">
      <div class="card-head">
        <img src="/setup/assets/images/tater-tube-readme.png" alt="">
        <div>
          <h2 class="title">API Token</h2>
          <div class="sub"><span class="pill warn">Required</span></div>
        </div>
      </div>
      <div class="card-body">
        <div class="field">
          <label for="apiToken">Token</label>
          <input id="apiToken" autocomplete="off" autocapitalize="off" spellcheck="false">
        </div>
        <button id="saveToken" type="button">Save Token</button>
        <div class="note">This install has MP240_API_TOKEN set. Enter it once on this device.</div>
      </div>
    </section>

    <section id="cards" class="grid"></section>
  </main>

  <div id="uploadModal" class="upload-modal" role="status" aria-live="polite">
    <div class="upload-box">
      <div class="upload-title">Uploading Commercials</div>
      <div id="uploadMeta" class="upload-meta">Preparing upload...</div>
      <div class="progress-shell"><div id="uploadProgress" class="progress-fill"></div></div>
      <div id="uploadDetail" class="upload-meta">0%</div>
    </div>
  </div>

  <script>
    const cards = document.getElementById("cards");
    const statusEl = document.getElementById("status");
    const tokenCard = document.getElementById("tokenCard");
    const tokenInput = document.getElementById("apiToken");
    const uploadModal = document.getElementById("uploadModal");
    const uploadMeta = document.getElementById("uploadMeta");
    const uploadProgress = document.getElementById("uploadProgress");
    const uploadDetail = document.getElementById("uploadDetail");
    const labelOverrides = {
      tater_server_url: "Tater Server URL",
      tater_server_token: "Tater Player Token",
      omg_username: "Indexer Username",
      newznab_url: "Newznab URL",
      newznab_api_key: "Newznab API Key"
    };
    const maxCommercialUploadBytes = 240 * 1024 * 1024;
    let setupData = null;
    let commercialLibrary = null;
    let vodChannels = null;
    let vodLibraries = null;
    let tubeChannels = null;
    let tubeLocalCatalog = null;
    let vodDraftId = "";
    let vodDraftTitle = "";
    let vodDraftCommercialCategory = "";
    let vodSearchQuery = "";
    let vodDraftItems = [];
    let vodSearchResults = [];
    let vodBrowser = null;
    let vodStack = [];
    let tubeDraftId = "";
    let tubeDraftTitle = "";
    let tubeDraftCommercialCategory = "";
    let tubeDraftItems = [];
    let tubeLocalBrowser = null;
    let tubeLocalStack = [];
    let currentModuleId = "";
    let plexPollTimer = null;
    let moonlightPollTimer = null;
    let commercialOpenCategories = new Set();
    let commercialPeers = [];
    let commercialPeerUrl = "";
    let commercialPeerToken = localStorage.getItem("taterTubePeerToken") || "";

    function token() {
      return localStorage.getItem("taterTubeSetupToken") || "";
    }

    function setStatus(text, tone) {
      statusEl.textContent = text || "";
      statusEl.style.color = tone === "err" ? "var(--danger)" : (tone === "ok" ? "var(--ok)" : "var(--muted)");
    }

    function showTokenPrompt(show) {
      tokenCard.classList.toggle("show", !!show);
      if (show) tokenInput.focus();
    }

    async function api(path, options = {}) {
      const headers = Object.assign({ "Content-Type": "application/json" }, options.headers || {});
      if (token()) {
        headers.Authorization = "Bearer " + token();
        headers["X-240MP-Token"] = token();
      }
      const response = await fetch(path, Object.assign({}, options, { headers }));
      if (response.status === 401) {
        showTokenPrompt(true);
        throw new Error("Unauthorized");
      }
      const data = await response.json().catch(() => ({}));
      if (!response.ok || data.ok === false) {
        throw new Error(data.message || data.error || ("HTTP " + response.status));
      }
      return data;
    }

    function uploadApi(path, formData, onProgress, authToken) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open("POST", path);
        const activeToken = authToken === undefined ? token() : authToken;
        if (activeToken) {
          xhr.setRequestHeader("Authorization", "Bearer " + activeToken);
          xhr.setRequestHeader("X-240MP-Token", activeToken);
        }
        xhr.upload.onprogress = event => {
          if (typeof onProgress === "function")
            onProgress(event.lengthComputable ? event.loaded : 0,
                       event.lengthComputable ? event.total : 0);
        };
        xhr.onerror = () => reject(new Error("Upload failed"));
        xhr.onload = () => {
          if (xhr.status === 401) {
            if (authToken === undefined)
              showTokenPrompt(true);
            reject(new Error("Unauthorized"));
            return;
          }
          let data = {};
          try {
            data = xhr.responseText ? JSON.parse(xhr.responseText) : {};
          } catch (error) {
            reject(new Error("Invalid upload response"));
            return;
          }
          if (xhr.status < 200 || xhr.status >= 300 || data.ok === false) {
            reject(new Error(data.message || data.error || ("HTTP " + xhr.status)));
            return;
          }
          resolve(data);
        };
        xhr.send(formData);
      });
    }

    function showUploadModal() {
      uploadModal.classList.add("show");
      updateUploadModal(0, "Preparing upload...", "");
    }

    function hideUploadModalSoon() {
      setTimeout(() => uploadModal.classList.remove("show"), 600);
    }

    function updateUploadModal(percent, meta, detail) {
      const bounded = Math.max(0, Math.min(100, percent || 0));
      uploadProgress.style.width = bounded.toFixed(1) + "%";
      uploadMeta.textContent = meta || "";
      uploadDetail.textContent = detail || (Math.round(bounded) + "%");
    }

    function text(value) {
      return value === undefined || value === null ? "" : String(value);
    }

    function cloneList(items) {
      return JSON.parse(JSON.stringify(items || []));
    }

    function formatBytes(bytes) {
      const value = Number(bytes || 0);
      if (value >= 1024 * 1024 * 1024)
        return (value / (1024 * 1024 * 1024)).toFixed(1) + " GB";
      if (value >= 1024 * 1024)
        return (value / (1024 * 1024)).toFixed(1) + " MB";
      if (value >= 1024)
        return (value / 1024).toFixed(1) + " KB";
      return value + " B";
    }

    function normalizePeerUrl(value) {
      let raw = text(value).trim();
      if (!raw) return "";
      if (!/^https?:\/\//i.test(raw))
        raw = "http://" + raw;
      try {
        const url = new URL(raw);
        if (!url.port)
          url.port = String((setupData && setupData.api_port) || 24024);
        url.pathname = "";
        url.search = "";
        url.hash = "";
        return url.toString().replace(/\/$/, "");
      } catch (error) {
        return "";
      }
    }

    function authHeaders(authToken) {
      const headers = {};
      if (authToken) {
        headers.Authorization = "Bearer " + authToken;
        headers["X-240MP-Token"] = authToken;
      }
      return headers;
    }

    function fetchWithTimeout(url, options = {}, timeoutMs = 1400) {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), timeoutMs);
      return fetch(url, Object.assign({}, options, { signal: controller.signal }))
        .finally(() => clearTimeout(timeout));
    }

    function ipv4Candidates() {
      const own = new Set((setupData && setupData.addresses ? setupData.addresses : [])
        .filter(address => /^\d+\.\d+\.\d+\.\d+$/.test(address)));
      if (/^\d+\.\d+\.\d+\.\d+$/.test(location.hostname))
        own.add(location.hostname);

      const prefixes = new Set();
      own.forEach(address => {
        const parts = address.split(".");
        if (parts.length === 4)
          prefixes.add(parts.slice(0, 3).join("."));
      });

      const hosts = [];
      prefixes.forEach(prefix => {
        for (let i = 1; i <= 254; i++) {
          const host = prefix + "." + i;
          if (!own.has(host))
            hosts.push(host);
        }
      });
      return hosts;
    }

    function commercialFileUrl(baseUrl, category, name) {
      const url = new URL(normalizePeerUrl(baseUrl) + "/api/v1/setup/commercials/file");
      url.searchParams.set("category", category || "");
      url.searchParams.set("name", name || "");
      return url.toString();
    }

    async function downloadCommercialBlob(baseUrl, authToken, category, video) {
      const response = await fetch(commercialFileUrl(baseUrl, category, video.name || ""), {
        headers: authHeaders(authToken)
      });
      if (response.status === 401)
        throw new Error("Peer token required.");
      if (!response.ok)
        throw new Error("Download failed: " + (video.name || "commercial"));
      return await response.blob();
    }

    function commercialItemsFromLibrary(library) {
      const items = [];
      const categories = library && Array.isArray(library.categories) ? library.categories : [];
      categories.forEach(category => {
        const categoryId = category.id || category.name || "Commercials";
        const videos = Array.isArray(category.videos) ? category.videos : [];
        videos.forEach(video => {
          if (video && video.name)
            items.push({ category: categoryId, video });
        });
      });
      return items;
    }

    async function loadPeerCommercialLibrary(peer, peerToken) {
      const response = await fetch(peer.baseUrl + "/api/v1/setup/commercials", {
        headers: authHeaders(peerToken)
      });
      if (response.status === 401)
        throw new Error("Peer token required.");
      const data = await response.json().catch(() => ({}));
      if (!response.ok || data.ok === false)
        throw new Error(data.message || data.error || ("HTTP " + response.status));
      return data;
    }

    function commercialUploadEndpoint(targetBaseUrl) {
      const endpoint = targetBaseUrl
        ? normalizePeerUrl(targetBaseUrl) + "/api/v1/setup/commercials/upload"
        : "/api/v1/setup/commercials/upload";
      return endpoint + "?dedupe=1";
    }

    async function uploadCommercialBlob(targetBaseUrl, targetToken, category, video, blob, onProgress) {
      const formData = new FormData();
      formData.append("category", category || "Commercials");
      formData.append("files", blob, video.name || "commercial.mp4");
      return await uploadApi(commercialUploadEndpoint(targetBaseUrl),

    function selectedCommercialPeerUrl(card) {
      const manualInput = card.querySelector("[data-commercial-peer-url]");
      const select = card.querySelector("[data-commercial-peer-select]");
      commercialPeerUrl = normalizePeerUrl(manualInput && manualInput.value.trim()
        ? manualInput.value
        : (select ? select.value : commercialPeerUrl));
      return commercialPeerUrl;
    }

    function selectedCommercialPeerToken(card) {
      const input = card.querySelector("[data-commercial-peer-token]");
      commercialPeerToken = input ? input.value.trim() : commercialPeerToken;
      localStorage.setItem("taterTubePeerToken", commercialPeerToken);
      return commercialPeerToken;
    }

    function selectedCommercialPeer(card) {
      const baseUrl = selectedCommercialPeerUrl(card);
      if (!baseUrl)
        throw new Error("Enter or scan for a peer player URL.");
      return commercialPeers.find(peer => normalizePeerUrl(peer.baseUrl) === baseUrl) || { baseUrl };
    }

    async function discoverCommercialPeers(card) {
      commercialPeerUrl = selectedCommercialPeerUrl(card) || commercialPeerUrl;
      cardMessage(card, "Scanning for Tater Tube players...");
      setStatus("Scanning for Tater Tube players...");

      const port = (setupData && setupData.api_port) || Number(location.port) || 24024;
      const currentOrigin = normalizePeerUrl(location.origin);
      const hosts = ipv4Candidates();
      const found = [];
      const seen = new Set();
      let cursor = 0;
      const workerCount = Math.min(32, hosts.length);

      const workers = Array.from({ length: workerCount }, async () => {
        while (cursor < hosts.length) {
          const host = hosts[cursor++];
          const baseUrl = "http://" + host + ":" + port;
          const normalized = normalizePeerUrl(baseUrl);
          if (!normalized || normalized === currentOrigin)
            continue;
          try {
            const response = await fetchWithTimeout(normalized + "/api/v1/discovery", {}, 1300);
            if (!response.ok)
              continue;
            const data = await response.json().catch(() => ({}));
            if (!data.ok || data.service !== "tater-tube-player")
              continue;
            if (seen.has(normalized))
              continue;
            seen.add(normalized);
            found.push({
              baseUrl: normalized,
              name: data.app && data.app.name ? data.app.name : "Tater Tube",
              version: data.app && data.app.version ? data.app.version : "",
              tokenRequired: !!data.token_required,
              commercialCount: data.commercial_count || 0,
              addresses: data.addresses || []
            });
          } catch (error) {
            /* Ignore hosts that are not Tater Tube players. */
          }
        }
      });

      await Promise.all(workers);
      commercialPeers = found.sort((a, b) => a.baseUrl.localeCompare(b.baseUrl));
      if (!commercialPeerUrl && commercialPeers.length > 0)
        commercialPeerUrl = commercialPeers[0].baseUrl;

      const message = commercialPeers.length
        ? "Found " + commercialPeers.length + " player" + (commercialPeers.length === 1 ? "" : "s") + "."
        : "No players found.";
      cardMessage(card, message, commercialPeers.length ? "ok" : "err");
      setStatus(message, commercialPeers.length ? "ok" : "err");
      render();
    }

    function titleCaseKey(key) {
      return text(key).replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
    }

    function labelFor(item) {
      return labelOverrides[item.key] || item.label || titleCaseKey(item.key);
    }

    function isSecretKey(key, item = {}) {
      const lower = text(key).toLowerCase();
      return item.secret || lower.includes("password") || lower.includes("api_key") ||
        lower.includes("token") || lower.includes("secret");
    }

    function isOn(value, fallback) {
      if (value === undefined || value === null || value === "") return !!fallback;
      if (typeof value === "boolean") return value;
      const normalized = text(value).toLowerCase();
      return normalized === "on" || normalized === "true" || normalized === "1" || normalized === "yes";
    }

    function currentValue(values, item) {
      const value = values ? values[item.key] : undefined;
      if (value === undefined || value === null || value === "") {
        if (item.type === "toggle") return item.default === "ON";
        return item.default || "";
      }
      return value;
    }

    function supportedField(item) {
      if (!item || !item.key) return false;
      if (item.type === "action") return false;
      if (item.type === "multiselect_submenu") return false;
      if (item.options_source === "dynamic") return false;
      return ["text", "toggle", "list_single", "directory_browser"].includes(item.type);
    }

    function fieldHtml(moduleId, values, item) {
      const key = item.key;
      const id = "field-" + moduleId.replace(/[^a-z0-9]/gi, "-") + "-" + key;
      const label = labelFor(item);
      const value = currentValue(values, item);
      if (item.type === "toggle") {
        const checked = isOn(value, item.default === "ON") ? "checked" : "";
        return `
          <div class="field">
            <label>${label}</label>
            <div class="toggle-row">
              <span>${label}</span>
              <label class="switch">
                <input type="checkbox" data-key="${key}" data-type="toggle" ${checked}>
                <span class="slider"></span>
              </label>
            </div>
          </div>`;
      }
      if (item.type === "list_single") {
        const options = Array.isArray(item.options) ? item.options : [];
        const optionHtml = options.map(option => {
          const selected = text(option) === text(value) ? "selected" : "";
          return `<option value="${escapeAttr(option)}" ${selected}>${escapeHtml(option)}</option>`;
        }).join("");
        return `
          <div class="field">
            <label for="${id}">${label}</label>
            <select id="${id}" data-key="${key}" data-type="text">${optionHtml}</select>
          </div>`;
      }
      const secret = isSecretKey(key, item);
      const inputType = secret ? "password" : "text";
      const inputValue = secret ? "" : text(value);
      const placeholder = secret && text(value) ? "Saved" : "";
      return `
        <div class="field">
          <label for="${id}">${label}</label>
          <input id="${id}" type="${inputType}" data-key="${key}" data-type="text"
            ${secret ? "data-secret=\"1\"" : ""}
            value="${escapeAttr(inputValue)}" placeholder="${escapeAttr(placeholder)}"
            autocapitalize="off" autocomplete="off" spellcheck="false">
        </div>`;
    }

    function actionHtml(moduleId, item) {
      if (!item || item.type !== "action" || !item.action_slot) return "";
      return `<button class="secondary" type="button" data-module="${escapeAttr(moduleId)}" data-action-slot="${escapeAttr(item.action_slot)}">${escapeHtml(labelFor(item))}</button>`;
    }

      return text(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")

    function cardMessage(card, message, tone = "") {
      const box = card.querySelector(".message");
      if (!box) return;
      box.textContent = message || "";
      box.className = "message show " + tone;
      if (!message) box.className = "message";
    }

    function collectValues(card) {
      const values = {};
      card.querySelectorAll("[data-key]").forEach(input => {
        const key = input.dataset.key;
        if (!key) return;
        if (input.dataset.secret === "1" && input.value.trim() === "") return;
        if (input.dataset.type === "toggle") values[key] = input.checked;
        else values[key] = input.value;
      });
      return values;
    }

    async function saveCard(card) {
      const moduleId = card.dataset.module || "";
      const values = collectValues(card);
      if (Object.keys(values).length === 0) {
        cardMessage(card, "No changed values to save.", "ok");
        return;
      }
      cardMessage(card, "Saving...");
      const result = await api("/api/v1/setup/settings", {
        method: "POST",
        body: JSON.stringify({ module_id: moduleId, values })
      });
      setupData = result.settings || setupData;
      cardMessage(card, "Saved.", "ok");
      setStatus("Settings saved.", "ok");
      setTimeout(loadSetup, 650);
    }

    async function startPlex(card) {
      const box = card.querySelector("#plexBox");
      box.className = "message show";
      box.textContent = "Requesting Plex code...";
      const result = await api("/api/v1/setup/plex/start", { method: "POST", body: "{}" });
      box.innerHTML = `Code: <strong>${escapeHtml(result.code)}</strong><br>URL: ${escapeHtml(result.url || "https://plex.tv/link")}<br>Waiting for approval...`;
      clearInterval(plexPollTimer);
      plexPollTimer = setInterval(() => pollPlex(card), 2200);
    }

    async function pollPlex(card) {
      const box = card.querySelector("#plexBox");
      try {
        const result = await api("/api/v1/setup/plex/poll", { method: "POST", body: "{}" });
        if (result.state === "pending") return;
        if (result.state === "authed") {
          clearInterval(plexPollTimer);
          box.className = "message show ok";
          box.textContent = "Plex signed in.";
          setupData = result.settings || setupData;
          setTimeout(loadSetup, 650);
          return;
        }
        if (result.state === "select_server") {
          clearInterval(plexPollTimer);
          const servers = result.servers || [];
          box.className = "message show";
          box.innerHTML = "Select Plex server:";
          servers.forEach(server => {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "secondary";
            button.textContent = server.name || server.url || "Plex Server";
            button.onclick = () => selectPlexServer(card, server.machineIdentifier);
            box.appendChild(document.createElement("br"));
            box.appendChild(button);
          });
        }
      } catch (error) {
        clearInterval(plexPollTimer);
        box.className = "message show err";
        box.textContent = error.message;
      }
    }

    async function uploadCommercialVideos(card) {
      const categoryInput = card.querySelector("[data-commercial-upload-category]");
      const fileInput = card.querySelector("[data-commercial-files]");
      const uploadButton = card.querySelector("[data-commercial-upload]");
      const category = categoryInput ? categoryInput.value.trim() : "Commercials";
      const files = fileInput ? Array.from(fileInput.files || []) : [];
      if (!files.length) {
        cardMessage(card, "Choose one or more videos.", "err");
        return;
      }
      const totalBytes = files.reduce((sum, file) => sum + (file.size || 0), 0);
      let completedBytes = 0;
      let saved = 0;
      const skipped = [];

      if (uploadButton) uploadButton.disabled = true;
      showUploadModal();
      cardMessage(card, "Uploading " + files.length + " video" + (files.length === 1 ? "" : "s") + "...");
      setStatus("Uploading commercial videos...");

      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        if ((file.size || 0) > maxCommercialUploadBytes) {
          skipped.push({
            name: file.name,
            reason: "File is larger than " + formatBytes(maxCommercialUploadBytes)
          });
          completedBytes += file.size || 0;
          updateUploadModal((completedBytes / Math.max(1, totalBytes)) * 100,
            "Skipping oversized file " + (i + 1) + " of " + files.length,
            file.name);
          continue;
        }

        const formData = new FormData();
        formData.append("category", category || "Commercials");
        formData.append("files", file, file.name);

        updateUploadModal((completedBytes / Math.max(1, totalBytes)) * 100,
          "Uploading " + (i + 1) + " of " + files.length,
          file.name);

        try {
          const result = await uploadApi("/api/v1/setup/commercials/upload", formData, loaded => {
            const current = completedBytes + Math.min(file.size || loaded || 0, loaded || 0);
            const percent = totalBytes > 0
              ? (current / totalBytes) * 100
              : ((i + (loaded > 0 ? 0.5 : 0)) / files.length) * 100;
            updateUploadModal(percent,
              "Uploading " + (i + 1) + " of " + files.length,
              file.name);
          });
          saved += result.saved || 0;
          if (result.skipped && result.skipped.length)
            skipped.push(...result.skipped);
          commercialLibrary = result.library || commercialLibrary;
        } catch (error) {
          if (error.message === "Unauthorized") {
            hideUploadModalSoon();
            if (uploadButton) uploadButton.disabled = false;
            throw error;
          }
          skipped.push({ name: file.name, reason: error.message });
        }

        completedBytes += file.size || 0;
      }

      updateUploadModal(100, "Upload complete", saved + " saved / " + skipped.length + " skipped");
      hideUploadModalSoon();
      if (fileInput) fileInput.value = "";
      if (uploadButton) uploadButton.disabled = false;

      const skippedText = skipped.length ? " Skipped " + skipped.length + "." : "";
      const tone = saved > 0 ? "ok" : "err";
      cardMessage(card, "Uploaded " + saved + "." + skippedText, tone);
      setStatus(saved > 0 ? "Commercial videos uploaded." : "No commercial videos uploaded.", tone);
      render();
    }

    async function syncCommercialsFromPeer(card) {
      const peer = selectedCommercialPeer(card);
      const peerToken = selectedCommercialPeerToken(card);
      cardMessage(card, "Reading peer commercial library...");
      setStatus("Reading peer commercial library...");

      const peerLibrary = await loadPeerCommercialLibrary(peer, peerToken);
      const items = commercialItemsFromLibrary(peerLibrary);
      if (!items.length) {
        cardMessage(card, "Peer has no commercials.", "err");
        setStatus("Peer has no commercials.", "err");
        return;
      }

      showUploadModal();
      let saved = 0;
      let skipped = 0;
      for (let i = 0; i < items.length; i++) {
        const item = items[i];
        const name = item.video.name || "commercial";
        updateUploadModal((i / Math.max(1, items.length)) * 100,
          "Syncing from peer " + (i + 1) + " of " + items.length,
          name);
        try {
          const blob = await downloadCommercialBlob(peer.baseUrl, peerToken, item.category, item.video);
          const result = await uploadCommercialBlob("", undefined, item.category, item.video, blob);
          saved += result.saved || 0;
          if (result.skipped && result.skipped.length)
            skipped += result.skipped.length;
          commercialLibrary = result.library || commercialLibrary;
        } catch (error) {
          skipped++;
        }
      }

      updateUploadModal(100, "Sync complete", saved + " saved / " + skipped + " skipped");
      hideUploadModalSoon();
      const tone = saved > 0 ? "ok" : "err";
      cardMessage(card, "Synced from peer. Saved " + saved + ". Skipped " + skipped + ".", tone);
      setStatus(saved > 0 ? "Commercial sync from peer complete." : "No commercials synced from peer.", tone);
      render();
    }

    async function syncCommercialsToPeer(card) {
      const peer = selectedCommercialPeer(card);
      const peerToken = selectedCommercialPeerToken(card);
      const items = commercialItemsFromLibrary(commercialLibrary);
      if (!items.length) {
        cardMessage(card, "This player has no commercials.", "err");
        setStatus("This player has no commercials.", "err");
        return;
      }

      showUploadModal();
      let saved = 0;
      let skipped = 0;
      for (let i = 0; i < items.length; i++) {
        const item = items[i];
        const name = item.video.name || "commercial";
        updateUploadModal((i / Math.max(1, items.length)) * 100,
          "Syncing to peer " + (i + 1) + " of " + items.length,
          name);
        try {
          const blob = await downloadCommercialBlob(location.origin, token(), item.category, item.video);
          const result = await uploadCommercialBlob(peer.baseUrl, peerToken, item.category, item.video, blob);
          saved += result.saved || 0;
          if (result.skipped && result.skipped.length)
            skipped += result.skipped.length;
        } catch (error) {
          skipped++;
        }
      }

      updateUploadModal(100, "Sync complete", saved + " saved / " + skipped + " skipped");
      hideUploadModalSoon();
      const tone = saved > 0 ? "ok" : "err";
      cardMessage(card, "Synced to peer. Saved " + saved + ". Skipped " + skipped + ".", tone);
      setStatus(saved > 0 ? "Commercial sync to peer complete." : "No commercials synced to peer.", tone);
      render();
    }

        button.onclick = () => syncCommercialsToPeer(button.closest(".card")).catch(error => {
          hideUploadModalSoon();
          cardMessage(button.closest(".card"), error.message, "err");
          setStatus(error.message, "err");
        });
      });
      document.querySelectorAll("[data-commercial-delete-file]").forEach(button => {
        button.onclick = event => {
          event.preventDefault();
          event.stopPropagation();
          deleteCommercialFile(button.closest(".card"), button).catch(error => {
            cardMessage(button.closest(".card"), error.message, "err");
          });
        };
      });
      document.querySelectorAll("[data-commercial-delete-category]").forEach(button => {
        button.onclick = event => {
          event.preventDefault();
          event.stopPropagation();
          deleteCommercialCategory(button.closest(".card"), button).catch(error => {
            cardMessage(button.closest(".card"), error.message, "err");
          });
        };
      });
      document.querySelectorAll("[data-vod-search]").forEach(button => {
        button.onclick = () => searchVodItems(button.closest(".card")).catch(error => {
          cardMessage(button.closest(".card"), error.message, "err");
        });
      });
      document.querySelectorAll("[data-vod-browse-library]").forEach(button => {
        button.onclick = () => browseVodLibrary(Number(button.dataset.vodBrowseLibrary || 0));
      });
      document.querySelectorAll("[data-vod-add-library]").forEach(button => {
        button.onclick = () => addVodLibrary(Number(button.dataset.vodAddLibrary || 0));
      });
      document.querySelectorAll("[data-vod-library-back]").forEach(button => {
        button.onclick = () => backVodLibraryBrowser();
      });
      document.querySelectorAll("[data-vod-add-current-library]").forEach(button => {
        button.onclick = () => addCurrentVodLibrary();
      });
      document.querySelectorAll("[data-vod-add-browser-item]").forEach(button => {
        button.onclick = () => addVodBrowserItem(Number(button.dataset.vodAddBrowserItem || 0));
      });
      document.querySelectorAll("[data-vod-add-result]").forEach(button => {
        button.onclick = () => addVodSearchResult(Number(button.dataset.vodAddResult || 0));
      });
      document.querySelectorAll("[data-vod-remove-draft]").forEach(button => {
        button.onclick = () => removeVodDraftItem(Number(button.dataset.vodRemoveDraft || 0));
      });
      document.querySelectorAll("[data-vod-save-channel]").forEach(button => {
        button.onclick = () => saveVodChannel(button.closest(".card")).catch(error => {
          cardMessage(button.closest(".card"), error.message, "err");
        });
      });
      document.querySelectorAll("[data-vod-edit-channel]").forEach(button => {
        button.onclick = () => editVodChannel(button.dataset.vodEditChannel || "");
      });
      document.querySelectorAll("[data-vod-clear-draft]").forEach(button => {
        button.onclick = () => {
          clearVodDraft();
          render();
        };
      });
      document.querySelectorAll("[data-vod-cancel-edit]").forEach(button => {
        button.onclick = () => {
          clearVodDraft();
          render();
        };
      });
      document.querySelectorAll("[data-vod-delete-channel]").forEach(button => {
        button.onclick = () => deleteVodChannel(button.closest(".card"), button).catch(error => {
          cardMessage(button.closest(".card"), error.message, "err");
        });
      });
      document.querySelectorAll("[data-tube-add-source]").forEach(button => {
        button.onclick = () => addTubeLocalSource(Number(button.dataset.tubeAddSource || 0));
      });
      document.querySelectorAll("[data-tube-browse-source]").forEach(button => {
        button.onclick = () => browseTubeLocalSource(Number(button.dataset.tubeBrowseSource || 0));
      });
      document.querySelectorAll("[data-tube-browse-item]").forEach(button => {
        button.onclick = () => browseTubeBrowserItem(Number(button.dataset.tubeBrowseItem || 0));
      });
      document.querySelectorAll("[data-tube-add-item]").forEach(button => {
        button.onclick = () => addTubeBrowserItem(Number(button.dataset.tubeAddItem || 0));
      });
      document.querySelectorAll("[data-tube-add-current-local]").forEach(button => {
        button.onclick = () => addTubeCurrentLocal();
      });
      document.querySelectorAll("[data-tube-local-back]").forEach(button => {
        button.onclick = () => backTubeLocalBrowser();
      });
      document.querySelectorAll("[data-tube-remove-draft]").forEach(button => {
        button.onclick = () => removeTubeDraftItem(Number(button.dataset.tubeRemoveDraft || 0));
      });
      document.querySelectorAll("[data-tube-save-channel]").forEach(button => {
        button.onclick = () => saveTubeChannel(button.closest(".card")).catch(error => {
          cardMessage(button.closest(".card"), error.message, "err");
        });
      });
      document.querySelectorAll("[data-tube-edit-channel]").forEach(button => {
        button.onclick = () => editTubeChannel(button.dataset.tubeEditChannel || "");
      });
      document.querySelectorAll("[data-tube-clear-draft]").forEach(button => {
        button.onclick = () => {
          clearTubeDraft();
          render();
        };
      });
      document.querySelectorAll("[data-tube-cancel-edit]").forEach(button => {
        button.onclick = () => {
          clearTubeDraft();
          render();
        };
      });
      document.querySelectorAll("[data-tube-refresh-local]").forEach(button => {
        button.onclick = () => {
          const card = button.closest(".card");
          captureTubeDraftForm(card);
          cardMessage(card, "Refreshing Local sources...");
          loadTubeLocalCatalog().then(() => {
            cardMessage(card, "Local sources refreshed.", "ok");
            render();
          }).catch(error => cardMessage(card, error.message, "err"));
        };
      });
      document.querySelectorAll("[data-tube-delete-channel]").forEach(button => {
        button.onclick = () => deleteTubeChannel(button.closest(".card"), button).catch(error => {
          cardMessage(button.closest(".card"), error.message, "err");
        });
      });
    }

    async function loadSetup() {
      setStatus("Loading setup...");
      showTokenPrompt(false);
      const results = await Promise.all([
        api("/api/v1/setup/modules"),
        loadCommercialLibrary(),
        loadVodChannels(),
        loadVodLibraries(),
        loadTubeChannels(),
        loadTubeLocalCatalog()
      ]);
      setupData = results[0];
      render();
      setStatus("Connected to " + (setupData.app.name || "Tater Tube") + " " + (setupData.app.version || ""), "ok");
    }

    document.getElementById("reload").onclick = () => loadSetup().catch(error => setStatus(error.message, "err"));
    document.getElementById("saveToken").onclick = () => {
      localStorage.setItem("taterTubeSetupToken", tokenInput.value.trim());
      loadSetup().catch(error => setStatus(error.message, "err"));
    };

    loadSetup().catch(error => setStatus(error.message, "err"));
  </script>
</body>
